<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#764ba2">

    <!-- SEO Meta Tags -->
    <title>나의 춤 DNA 찾기 | MU:ON 춤 유형 테스트</title>
    <meta name="description" content="12개 질문으로 알아보는 나의 춤 DNA! 파워풀, 그루버, 실루엣... 당신의 춤에는 어떤 DNA가 숨어있나요?">
    <meta name="keywords" content="춤 테스트, 댄스 유형, MBTI, 성격 테스트, 한국무용, MU:ON">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://muon.dance/quiz.html">

    <!-- Open Graph / SNS Share -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="나의 춤 DNA 찾기 | MU:ON">
    <meta property="og:description" content="12개 질문으로 알아보는 나만의 춤 스타일! 지금 테스트해보세요.">
    <meta property="og:image" content="https://muon.dance/assets/og-image.png">
    <meta property="og:url" content="https://muon.dance/quiz.html">
    <meta property="og:site_name" content="MU:ON">
    <meta property="og:locale" content="ko_KR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="나의 춤 DNA 찾기 | MU:ON">
    <meta name="twitter:description" content="12개 질문으로 알아보는 나만의 춤 스타일!">
    <meta name="twitter:image" content="https://muon.dance/assets/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="quiz.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-shapes">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>
    </div>

    <!-- Intro Screen -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-container">
            <div class="intro-content">
                <!-- Logo -->
                <p class="intro-logo">MU:ON</p>

                <!-- Main Title -->
                <h1 class="intro-title">나의 춤 DNA 찾기</h1>
                <p class="intro-subtitle">당신의 춤에는 어떤 DNA가 숨어 있나요?</p>

                <!-- Story Section -->
                <div class="intro-story">
                    <p>
                        모든 춤에는 고유한 <strong>DNA</strong>가 있습니다.
                    </p>
                    <p>
                        누군가는 무대를 압도하는 <em>힘</em>으로,<br>
                        누군가는 손끝 하나의 <em>섬세함</em>으로,<br>
                        또 누군가는 온몸으로 전하는 <em>이야기</em>로<br>
                        자신만의 춤을 완성합니다.
                    </p>
                    <p>
                        12개의 질문을 통해<br>
                        <strong>당신만의 춤 DNA</strong>를 발견해보세요.
                    </p>
                </div>

                <!-- Info Tags -->
                <div class="intro-info">
                    <span class="info-tag">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        약 2-3분 소요
                    </span>
                    <span class="info-tag">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"/>
                            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                        </svg>
                        12개 질문
                    </span>
                </div>

                <!-- Start Button -->
                <button class="intro-start-btn" id="startQuizBtn">
                    <span>테스트 시작하기</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>

                <!-- Footer Note -->
                <p class="intro-note">결과는 저장되지 않으며 언제든 다시 할 수 있어요</p>
            </div>
        </div>
    </div>

    <!-- Quiz Container -->
    <div class="quiz-container" id="quizContainer" style="display: none;">
        <!-- Header with Progress -->
        <header class="quiz-header">
            <button class="back-button" id="backBtn" aria-label="이전 질문" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>

            <div class="progress-section">
                <span class="progress-emoji" id="progressEmoji">🌱</span>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <span class="progress-text" id="progressText">0 / 12</span>
            </div>

            <button class="close-button" id="closeBtn" aria-label="테스트 종료">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </header>

        <!-- Question Area -->
        <main class="question-wrapper" id="questionWrapper">
            <!-- Question cards will be dynamically inserted here -->
        </main>
    </div>

    <!-- Exit Confirmation Modal -->
    <div class="share-modal" id="exitModal">
        <div class="share-modal-content" style="padding-bottom: 32px;">
            <div class="share-modal-header">
                <h3 class="share-modal-title">테스트를 종료할까요?</h3>
                <button class="share-modal-close" id="exitModalClose" aria-label="닫기">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <p style="color: #6c757d; margin-bottom: 24px; font-size: 15px;">
                지금 나가면 진행 중인 테스트가 초기화됩니다.
            </p>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary" id="continueTestBtn" style="flex: 1; background: #f1f3f5; color: #495057;">
                    계속하기
                </button>
                <button class="btn btn-primary" id="exitTestBtn" style="flex: 1; background: #FF6B6B;">
                    종료하기
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./js/quiz-ui.js"></script>
</body>
</html>
