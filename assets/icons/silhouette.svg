  <!-- 팔 라인 - 우아하게 뻗은 -->
  <path d="M36 24
           Q28 20, 16 16"
        stroke="currentColor"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>
  <path d="M38 28
           Q46 24, 54 28"
