        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>
  <!-- 머리 -->
  <circle cx="32" cy="10" r="5" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- 발끝 포인트 -->
  <circle cx="40" cy="56" r="2" fill="currentColor"/>
</svg>
