<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance DNA Quiz Engine - Test Suite</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      color: white;
    }

    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px 30px;
      border-radius: 12px;
      text-align: center;
      min-width: 120px;
    }

    .stat-box .number {
      font-size: 2.5rem;
      font-weight: 700;
    }

    .stat-box .label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }

    .stat-box.passed .number { color: #2ecc71; }
    .stat-box.failed .number { color: #e74c3c; }
    .stat-box.total .number { color: #3498db; }

    .test-sections {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .test-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .test-section h2 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .test-section h2 .icon {
      font-size: 1.5rem;
    }

    .test-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin: 8px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .test-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .test-status {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .test-status.pending {
      background: #95a5a6;
      color: white;
    }

    .test-status.running {
      background: #f39c12;
      color: white;
      animation: pulse 1s infinite;
    }

    .test-status.passed {
      background: #2ecc71;
      color: white;
    }

    .test-status.failed {
      background: #e74c3c;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .test-name {
      flex: 1;
      font-size: 0.95rem;
    }

    .test-time {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-left: 10px;
    }

    .console-container {
      background: #0d1117;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid #30363d;
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .console-header h3 {
      font-size: 1.1rem;
      color: #8b949e;
    }

    .console-clear {
      padding: 6px 12px;
      font-size: 0.85rem;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 6px;
      cursor: pointer;
    }

    .console-clear:hover {
      background: #30363d;
    }

    #console-output {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #161b22;
      border-radius: 8px;
    }

    .log-entry {
      padding: 4px 8px;
      margin: 2px 0;
      border-radius: 4px;
    }

    .log-entry.info { color: #58a6ff; }
    .log-entry.success { color: #3fb950; background: rgba(63, 185, 80, 0.1); }
    .log-entry.error { color: #f85149; background: rgba(248, 81, 73, 0.1); }
    .log-entry.warn { color: #d29922; background: rgba(210, 153, 34, 0.1); }
    .log-entry.debug { color: #8b949e; }

    .error-details {
      margin-top: 5px;
      padding: 10px;
      background: rgba(248, 81, 73, 0.1);
      border-left: 3px solid #f85149;
      font-size: 0.8rem;
      white-space: pre-wrap;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin: 2px;
    }

    .type-powerful { background: #FF4757; color: white; }
    .type-precise { background: #5352ED; color: white; }
    .type-minimal { background: #2ED573; color: white; }
    .type-expresser { background: #FF6B81; color: white; }
    .type-technician { background: #1E90FF; color: white; }
    .type-classical { background: #9B59B6; color: white; }
    .type-groover { background: #F39C12; color: white; }
    .type-silhouette { background: #00CEC9; color: white; }

    .scenario-result {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dance DNA Quiz Engine Test Suite</h1>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="runAllTests()">Run All Tests</button>
      <button class="btn-secondary" onclick="runQuickTests()">Run Quick Tests</button>
      <button class="btn-danger" onclick="resetTests()">Reset All</button>
    </div>

    <div class="stats">
      <div class="stat-box passed">
        <div class="number" id="passed-count">0</div>
        <div class="label">Passed</div>
      </div>
      <div class="stat-box failed">
        <div class="number" id="failed-count">0</div>
        <div class="label">Failed</div>
      </div>
      <div class="stat-box total">
        <div class="number" id="total-count">0</div>
        <div class="label">Total</div>
      </div>
    </div>

    <div class="test-sections">
      <!-- QuizEngine Core Tests -->
      <div class="test-section">
        <h2><span class="icon">&#9881;</span> QuizEngine Core Tests</h2>
        <div id="core-tests"></div>
        <button class="btn-secondary" style="margin-top: 15px; width: 100%;" onclick="runCoreTests()">
          Run Core Tests
        </button>
      </div>

      <!-- Storage Tests -->
      <div class="test-section">
        <h2><span class="icon">&#128190;</span> Storage & URL Tests</h2>
        <div id="storage-tests"></div>
        <button class="btn-secondary" style="margin-top: 15px; width: 100%;" onclick="runStorageTests()">
          Run Storage Tests
        </button>
      </div>

      <!-- Type Scenario Tests -->
      <div class="test-section">
        <h2><span class="icon">&#127919;</span> Type Scenario Tests</h2>
        <div id="scenario-tests"></div>
        <button class="btn-secondary" style="margin-top: 15px; width: 100%;" onclick="runScenarioTests()">
          Run Scenario Tests
        </button>
      </div>

      <!-- Edge Case Tests -->
      <div class="test-section">
        <h2><span class="icon">&#9888;</span> Edge Case Tests</h2>
        <div id="edge-tests"></div>
        <button class="btn-secondary" style="margin-top: 15px; width: 100%;" onclick="runEdgeTests()">
          Run Edge Tests
        </button>
      </div>
    </div>

    <div class="console-container">
      <div class="console-header">
        <h3>Console Output</h3>
        <button class="console-clear" onclick="clearConsole()">Clear</button>
      </div>
      <div id="console-output"></div>
    </div>
  </div>

  <script type="module">
    import { QuizEngine, DANCE_TYPES, getQuizEngine, resetQuizEngine } from '../js/quiz-engine.js';
    import { quizData } from '../js/quiz-data.js';

    // ========================================
    // Test Framework
    // ========================================
    class TestRunner {
      constructor() {
        this.tests = [];
        this.results = { passed: 0, failed: 0, total: 0 };
        this.currentTest = null;
      }

      addTest(category, name, testFn) {
        this.tests.push({ category, name, testFn, status: 'pending', time: null, error: null });
      }

      async runTest(test) {
        const startTime = performance.now();
        test.status = 'running';
        this.updateTestUI(test);

        try {
          await test.testFn();
          test.status = 'passed';
          test.time = Math.round(performance.now() - startTime);
          this.results.passed++;
          this.log(`PASS: ${test.name}`, 'success');
        } catch (error) {
          test.status = 'failed';
          test.time = Math.round(performance.now() - startTime);
          test.error = error;
          this.results.failed++;
          this.log(`FAIL: ${test.name}`, 'error');
          this.log(`  Error: ${error.message}`, 'error');
          if (error.stack) {
            this.log(`  Stack: ${error.stack.split('\n').slice(1, 3).join('\n')}`, 'debug');
          }
        }

        this.results.total++;
        this.updateTestUI(test);
        this.updateStats();
      }

      async runAll() {
        this.resetResults();
        this.log('Starting all tests...', 'info');
        const startTime = performance.now();

        for (const test of this.tests) {
          await this.runTest(test);
          await this.sleep(50); // Brief pause between tests for UI update
        }

        const totalTime = Math.round(performance.now() - startTime);
        this.log(`\nAll tests completed in ${totalTime}ms`, 'info');
        this.log(`Results: ${this.results.passed} passed, ${this.results.failed} failed`,
          this.results.failed > 0 ? 'warn' : 'success');
      }

      async runCategory(category) {
        const categoryTests = this.tests.filter(t => t.category === category);
        this.log(`Running ${category} tests...`, 'info');

        for (const test of categoryTests) {
          test.status = 'pending';
          test.time = null;
          test.error = null;
        }

        for (const test of categoryTests) {
          await this.runTest(test);
          await this.sleep(50);
        }
      }

      resetResults() {
        this.results = { passed: 0, failed: 0, total: 0 };
        for (const test of this.tests) {
          test.status = 'pending';
          test.time = null;
          test.error = null;
        }
        this.updateStats();
        this.renderAllTests();
      }

      updateTestUI(test) {
        const element = document.getElementById(`test-${test.name.replace(/\s+/g, '-')}`);
        if (element) {
          const statusEl = element.querySelector('.test-status');
          const timeEl = element.querySelector('.test-time');

          statusEl.className = `test-status ${test.status}`;
          statusEl.textContent = test.status === 'passed' ? 'O' :
                                 test.status === 'failed' ? 'X' :
                                 test.status === 'running' ? '...' : '-';

          if (test.time !== null) {
            timeEl.textContent = `${test.time}ms`;
          }
        }
      }

      updateStats() {
        document.getElementById('passed-count').textContent = this.results.passed;
        document.getElementById('failed-count').textContent = this.results.failed;
        document.getElementById('total-count').textContent = this.results.total;

        const progress = this.tests.length > 0 ?
          (this.results.total / this.tests.length) * 100 : 0;
        document.getElementById('progress-fill').style.width = `${progress}%`;
      }

      renderAllTests() {
        const categories = {
          'core': 'core-tests',
          'storage': 'storage-tests',
          'scenario': 'scenario-tests',
          'edge': 'edge-tests'
        };

        for (const [category, containerId] of Object.entries(categories)) {
          const container = document.getElementById(containerId);
          if (container) {
            container.innerHTML = this.tests
              .filter(t => t.category === category)
              .map(t => this.renderTestItem(t))
              .join('');
          }
        }
      }

      renderTestItem(test) {
        return `
          <div class="test-item" id="test-${test.name.replace(/\s+/g, '-')}">
            <div class="test-status ${test.status}">${test.status === 'passed' ? 'O' : test.status === 'failed' ? 'X' : '-'}</div>
            <div class="test-name">${test.name}</div>
            <div class="test-time">${test.time !== null ? test.time + 'ms' : ''}</div>
          </div>
        `;
      }

      log(message, type = 'info') {
        const consoleOutput = document.getElementById('console-output');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        consoleOutput.appendChild(entry);
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
      }

      sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }
    }

    // Assertion helper
    function assert(condition, message) {
      if (!condition) {
        throw new Error(message || 'Assertion failed');
      }
    }

    function assertEqual(actual, expected, message) {
      if (actual !== expected) {
        throw new Error(message || `Expected ${expected}, but got ${actual}`);
      }
    }

    function assertDeepEqual(actual, expected, message) {
      const actualStr = JSON.stringify(actual);
      const expectedStr = JSON.stringify(expected);
      if (actualStr !== expectedStr) {
        throw new Error(message || `Expected ${expectedStr}, but got ${actualStr}`);
      }
    }

    // ========================================
    // Test Suite Setup
    // ========================================
    const runner = new TestRunner();

    // ========================================
    // Core Tests
    // ========================================

    runner.addTest('core', 'Score Initialization', () => {
      const engine = new QuizEngine();
      const scores = engine.getCurrentScores();

      // All 8 types should be initialized to 0
      assertEqual(Object.keys(scores).length, 8, 'Should have 8 dance types');
      for (const type of Object.values(DANCE_TYPES)) {
        assertEqual(scores[type], 0, `${type} should be initialized to 0`);
      }
    });

    runner.addTest('core', 'Record Single Answer', () => {
      const engine = new QuizEngine();
      const answerScores = { powerful: 2 };

      engine.recordAnswer(0, 0, answerScores);

      const scores = engine.getCurrentScores();
      assertEqual(scores.powerful, 2, 'Powerful score should be 2');
      assertEqual(engine.getAllAnswers().length, 1, 'Should have 1 answer recorded');
    });

    runner.addTest('core', 'Record Multiple Answers', () => {
      const engine = new QuizEngine();

      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.recordAnswer(1, 1, { groover: 2 });
      engine.recordAnswer(2, 2, { expresser: 1, classical: 1 });

      const scores = engine.getCurrentScores();
      assertEqual(scores.powerful, 2, 'Powerful score should be 2');
      assertEqual(scores.groover, 2, 'Groover score should be 2');
      assertEqual(scores.expresser, 1, 'Expresser score should be 1');
      assertEqual(scores.classical, 1, 'Classical score should be 1');
      assertEqual(engine.getAllAnswers().length, 3, 'Should have 3 answers recorded');
    });

    runner.addTest('core', 'Duplicate Answer Handling', () => {
      const engine = new QuizEngine();

      // First answer for question 0
      engine.recordAnswer(0, 0, { powerful: 2 });
      assertEqual(engine.getCurrentScores().powerful, 2, 'Initial powerful score should be 2');

      // Change answer for same question
      engine.recordAnswer(0, 1, { groover: 2 });

      const scores = engine.getCurrentScores();
      assertEqual(scores.powerful, 0, 'Powerful score should be 0 after answer change');
      assertEqual(scores.groover, 2, 'Groover score should be 2');
      assertEqual(engine.getAllAnswers().length, 1, 'Should still have only 1 answer');
    });

    runner.addTest('core', 'Remove Answer', () => {
      const engine = new QuizEngine();

      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.recordAnswer(1, 1, { groover: 2 });

      engine.removeAnswer(0);

      const scores = engine.getCurrentScores();
      assertEqual(scores.powerful, 0, 'Powerful score should be 0 after removal');
      assertEqual(scores.groover, 2, 'Groover score should remain 2');
      assertEqual(engine.getAllAnswers().length, 1, 'Should have 1 answer remaining');
    });

    runner.addTest('core', 'Calculate Result - Primary and Secondary', () => {
      const engine = new QuizEngine();

      // Give highest score to powerful, second highest to groover
      engine.recordAnswer(0, 0, { powerful: 3 });
      engine.recordAnswer(1, 1, { groover: 2 });
      engine.recordAnswer(2, 2, { minimal: 1 });

      const result = engine.calculateResult();

      assertEqual(result.primary, 'powerful', 'Primary should be powerful');
      assertEqual(result.secondary, 'groover', 'Secondary should be groover');
      assertEqual(result.primaryScore, 3, 'Primary score should be 3');
      assertEqual(result.secondaryScore, 2, 'Secondary score should be 2');
      assertEqual(result.isTied, false, 'Should not be tied');
    });

    runner.addTest('core', 'Calculate Result - Ranking Order', () => {
      const engine = new QuizEngine();

      engine.recordAnswer(0, 0, { powerful: 5 });
      engine.recordAnswer(1, 1, { groover: 4 });
      engine.recordAnswer(2, 2, { minimal: 3 });
      engine.recordAnswer(3, 3, { precise: 2 });

      const result = engine.calculateResult();

      assertEqual(result.ranking[0].type, 'powerful', 'First rank should be powerful');
      assertEqual(result.ranking[1].type, 'groover', 'Second rank should be groover');
      assertEqual(result.ranking[2].type, 'minimal', 'Third rank should be minimal');
      assertEqual(result.ranking[3].type, 'precise', 'Fourth rank should be precise');
    });

    runner.addTest('core', 'Get Progress', () => {
      const engine = new QuizEngine();
      const totalQuestions = 12;

      let progress = engine.getProgress(totalQuestions);
      assertEqual(progress.answered, 0, 'Initial answered should be 0');
      assertEqual(progress.percentage, 0, 'Initial percentage should be 0');

      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.recordAnswer(1, 1, { groover: 2 });
      engine.recordAnswer(2, 2, { minimal: 2 });

      progress = engine.getProgress(totalQuestions);
      assertEqual(progress.answered, 3, 'Answered should be 3');
      assertEqual(progress.percentage, 25, 'Percentage should be 25');
    });

    runner.addTest('core', 'Get Answer For Question', () => {
      const engine = new QuizEngine();

      assertEqual(engine.getAnswerForQuestion(0), null, 'Should return null for unanswered question');

      engine.recordAnswer(0, 2, { minimal: 2 });
      assertEqual(engine.getAnswerForQuestion(0), 2, 'Should return answer index 2');
    });

    runner.addTest('core', 'Is Result Valid', () => {
      const engine = new QuizEngine();

      assertEqual(engine.isResultValid(1), false, 'Should be invalid with 0 answers');

      engine.recordAnswer(0, 0, { powerful: 2 });
      assertEqual(engine.isResultValid(1), true, 'Should be valid with 1 answer');
      assertEqual(engine.isResultValid(5), false, 'Should be invalid when requiring 5 answers');
    });

    // ========================================
    // Storage & URL Tests
    // ========================================

    runner.addTest('storage', 'Save Result to localStorage', () => {
      const engine = new QuizEngine();
      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.recordAnswer(1, 1, { groover: 2 });

      const result = engine.calculateResult();
      const saved = engine.saveResult(result);

      assertEqual(saved, true, 'Save should return true');

      const storedData = localStorage.getItem('dance_dna_result');
      assert(storedData !== null, 'Data should be saved in localStorage');

      const parsed = JSON.parse(storedData);
      assertEqual(parsed.result.primary, 'powerful', 'Stored primary should be powerful');
    });

    runner.addTest('storage', 'Load Result from localStorage', () => {
      const engine1 = new QuizEngine();
      engine1.recordAnswer(0, 0, { powerful: 3 });
      engine1.recordAnswer(1, 1, { groover: 2 });
      const result1 = engine1.calculateResult();
      engine1.saveResult(result1);

      // Create new engine and load
      const engine2 = new QuizEngine();
      const loadedResult = engine2.loadResult();

      assert(loadedResult !== null, 'Should load result');
      assertEqual(loadedResult.primary, 'powerful', 'Loaded primary should be powerful');

      // Check that scores are restored
      const scores = engine2.getCurrentScores();
      assertEqual(scores.powerful, 3, 'Restored powerful score should be 3');
      assertEqual(scores.groover, 2, 'Restored groover score should be 2');
    });

    runner.addTest('storage', 'Clear Result from localStorage', () => {
      const engine = new QuizEngine();
      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.saveResult(engine.calculateResult());

      const cleared = engine.clearResult();
      assertEqual(cleared, true, 'Clear should return true');

      const storedData = localStorage.getItem('dance_dna_result');
      assert(storedData === null, 'Data should be removed from localStorage');

      // Scores should be reset
      assertEqual(engine.getCurrentScores().powerful, 0, 'Scores should be reset');
    });

    runner.addTest('storage', 'Generate Share URL', () => {
      const engine = new QuizEngine();
      engine.recordAnswer(0, 0, { powerful: 3 });
      engine.recordAnswer(1, 1, { groover: 2 });

      const result = engine.calculateResult();
      const url = engine.generateShareUrl(result);

      assert(url.includes('p=powerful'), 'URL should contain primary type');
      assert(url.includes('s=groover'), 'URL should contain secondary type');
      assert(url.includes('sc='), 'URL should contain scores');
      assert(url.includes('t='), 'URL should contain timestamp');
    });

    runner.addTest('storage', 'Find Type From Abbreviation', () => {
      const engine = new QuizEngine();

      assertEqual(engine.findTypeFromAbbrev('pl'), 'powerful', 'pl should map to powerful');
      assertEqual(engine.findTypeFromAbbrev('pe'), 'precise', 'pe should map to precise');
      assertEqual(engine.findTypeFromAbbrev('ml'), 'minimal', 'ml should map to minimal');
      assertEqual(engine.findTypeFromAbbrev('er'), 'expresser', 'er should map to expresser');
      assertEqual(engine.findTypeFromAbbrev('tn'), 'technician', 'tn should map to technician');
      assertEqual(engine.findTypeFromAbbrev('cl'), 'classical', 'cl should map to classical');
      assertEqual(engine.findTypeFromAbbrev('gr'), 'groover', 'gr should map to groover');
      assertEqual(engine.findTypeFromAbbrev('se'), 'silhouette', 'se should map to silhouette');
      assertEqual(engine.findTypeFromAbbrev('xx'), null, 'Invalid abbrev should return null');
    });

    runner.addTest('storage', 'Singleton Pattern', () => {
      const engine1 = getQuizEngine();
      const engine2 = getQuizEngine();

      assert(engine1 === engine2, 'getQuizEngine should return same instance');

      const engine3 = resetQuizEngine();
      const engine4 = getQuizEngine();

      assert(engine3 === engine4, 'After reset, should get new singleton');
      assert(engine1 !== engine3, 'Reset should create new instance');
    });

    // ========================================
    // Type Scenario Tests
    // ========================================

    function createScenarioTest(typeName, typeKey, answerPattern) {
      return () => {
        const engine = new QuizEngine();

        // Apply answer pattern: array of [questionId, answerIndex]
        for (const [questionId, answerIndex] of answerPattern) {
          const question = quizData.questions[questionId];
          const answer = question.answers[answerIndex];
          engine.recordAnswer(questionId, answerIndex, answer.scores);
        }

        const result = engine.calculateResult();
        assertEqual(result.primary, typeKey,
          `Primary type should be ${typeName}, but got ${result.primary} (score: ${result.scores[typeKey]})`);
      };
    }

    // Powerful type scenario - 선택: 0-0, 3-0, 4-0, 8-0, 10-0
    runner.addTest('scenario', 'Powerful Type Scenario', createScenarioTest(
      'Powerful', 'powerful',
      [[0, 0], [3, 0], [4, 0], [8, 0], [10, 0]]
    ));

    // Precise type scenario - 선택: 0-3, 2-3, 6-0, 7-1, 10-2
    runner.addTest('scenario', 'Precise Type Scenario', createScenarioTest(
      'Precise', 'precise',
      [[0, 3], [2, 3], [6, 0], [7, 1], [10, 2]]
    ));

    // Minimal type scenario - 선택: 1-1, 2-1, 4-1, 6-2, 11-1
    runner.addTest('scenario', 'Minimal Type Scenario', createScenarioTest(
      'Minimal', 'minimal',
      [[1, 1], [2, 1], [4, 1], [6, 2], [11, 1]]
    ));

    // Expresser type scenario - 선택: 0-2, 2-2, 4-2, 10-1, 11-3
    runner.addTest('scenario', 'Expresser Type Scenario', createScenarioTest(
      'Expresser', 'expresser',
      [[0, 2], [2, 2], [4, 2], [10, 1], [11, 3]]
    ));

    // Technician type scenario - 선택: 1-2, 3-2, 5-0, 9-1, 11-2
    runner.addTest('scenario', 'Technician Type Scenario', createScenarioTest(
      'Technician', 'technician',
      [[1, 2], [3, 2], [5, 0], [9, 1], [11, 2]]
    ));

    // Classical type scenario - 선택: 1-3, 5-1, 6-1, 7-2, 9-3
    runner.addTest('scenario', 'Classical Type Scenario', createScenarioTest(
      'Classical', 'classical',
      [[1, 3], [5, 1], [6, 1], [7, 2], [9, 3]]
    ));

    // Groover type scenario - 선택: 0-1, 3-3, 5-2, 6-3, 9-2
    runner.addTest('scenario', 'Groover Type Scenario', createScenarioTest(
      'Groover', 'groover',
      [[0, 1], [3, 3], [5, 2], [6, 3], [9, 2]]
    ));

    // Silhouette type scenario - 선택: 1-0, 2-3, 8-3, 10-3, 11-0
    runner.addTest('scenario', 'Silhouette Type Scenario', createScenarioTest(
      'Silhouette', 'silhouette',
      [[1, 0], [2, 3], [8, 3], [10, 3], [11, 0]]
    ));

    // ========================================
    // Edge Case Tests
    // ========================================

    runner.addTest('edge', 'Tied Scores Detection', () => {
      const engine = new QuizEngine();

      // Give equal scores to two types
      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.recordAnswer(1, 1, { groover: 2 });

      const result = engine.calculateResult();
      assertEqual(result.isTied, true, 'Should detect tied scores');
      assertEqual(result.primaryScore, result.secondaryScore, 'Tied scores should be equal');
    });

    runner.addTest('edge', 'Empty Answers Result', () => {
      const engine = new QuizEngine();

      const result = engine.calculateResult();

      // Should still return a valid result structure
      assert(result.primary !== undefined, 'Should have primary property');
      assert(result.scores !== undefined, 'Should have scores property');
      assertEqual(result.totalQuestions, 0, 'Total questions should be 0');
      assertEqual(engine.isResultValid(1), false, 'Result should be invalid');
    });

    runner.addTest('edge', 'Invalid Score Type Handling', () => {
      const engine = new QuizEngine();

      // Try to add score for non-existent type
      engine.recordAnswer(0, 0, { invalidType: 5, powerful: 2 });

      const scores = engine.getCurrentScores();
      assertEqual(scores.powerful, 2, 'Valid type score should be recorded');
      assertEqual(scores.invalidType, undefined, 'Invalid type should not exist');
    });

    runner.addTest('edge', 'Very Large Scores', () => {
      const engine = new QuizEngine();

      engine.recordAnswer(0, 0, { powerful: 9999 });

      const result = engine.calculateResult();
      assertEqual(result.primaryScore, 9999, 'Should handle large scores');
    });

    runner.addTest('edge', 'Negative Scores After Removal', () => {
      const engine = new QuizEngine();

      // This shouldn't happen in normal flow, but test defensive coding
      engine.recordAnswer(0, 0, { powerful: 2 });
      engine.removeAnswer(0);
      engine.removeAnswer(0); // Try to remove again

      const scores = engine.getCurrentScores();
      // Score should be 0, not negative
      assertEqual(scores.powerful, 0, 'Score should be 0 after removal');
    });

    runner.addTest('edge', 'All Types Equal Score', () => {
      const engine = new QuizEngine();

      // Give all types the same score
      for (const type of Object.values(DANCE_TYPES)) {
        engine.scores[type] = 5;
      }

      const result = engine.calculateResult();
      assert(result.primary !== null, 'Should still select a primary type');
      assert(result.isTied === true, 'Should be tied when all equal');
    });

    runner.addTest('edge', 'Load With Corrupted localStorage', () => {
      // Save corrupted data
      localStorage.setItem('dance_dna_result', 'not valid json{{{');

      const engine = new QuizEngine();
      const result = engine.loadResult();

      assertEqual(result, null, 'Should return null for corrupted data');

      // Clean up
      localStorage.removeItem('dance_dna_result');
    });

    runner.addTest('edge', 'Parse URL Without Parameters', () => {
      const engine = new QuizEngine();

      // Save original location
      const originalSearch = window.location.search;

      // Mock empty search
      const result = engine.parseResultFromUrl();

      // When p parameter is missing, should return null
      if (!window.location.search.includes('p=')) {
        assertEqual(result, null, 'Should return null when no URL parameters');
      }
    });

    runner.addTest('edge', 'Progress With Zero Total Questions', () => {
      const engine = new QuizEngine();

      const progress = engine.getProgress(0);
      assertEqual(progress.percentage, 0, 'Should not divide by zero');
    });

    runner.addTest('edge', 'Quiz Data Integrity', () => {
      // Check that quiz data is properly structured
      assertEqual(quizData.questions.length, 12, 'Should have 12 questions');

      for (const question of quizData.questions) {
        assert(question.answers.length === 4, `Question ${question.id} should have 4 answers`);

        for (const answer of question.answers) {
          assert(answer.text !== undefined, 'Answer should have text');
          assert(answer.scores !== undefined, 'Answer should have scores');

          for (const [type, score] of Object.entries(answer.scores)) {
            assert(Object.values(DANCE_TYPES).includes(type),
              `Invalid type "${type}" in question ${question.id}`);
            assert(typeof score === 'number' && score > 0,
              `Score should be positive number, got ${score}`);
          }
        }
      }
    });

    runner.addTest('edge', 'Type Data Completeness', () => {
      // Check all 8 types have complete data
      for (const typeKey of Object.values(DANCE_TYPES)) {
        const typeData = quizData.types[typeKey];
        assert(typeData !== undefined, `Type ${typeKey} should exist in types data`);
        assert(typeData.name !== undefined, `Type ${typeKey} should have name`);
        assert(typeData.englishName !== undefined, `Type ${typeKey} should have englishName`);
        assert(typeData.nickname !== undefined, `Type ${typeKey} should have nickname`);
        assert(typeData.description !== undefined, `Type ${typeKey} should have description`);
        assert(typeData.traits && typeData.traits.length > 0, `Type ${typeKey} should have traits`);
        assert(typeData.advice !== undefined, `Type ${typeKey} should have advice`);
        assert(typeData.color !== undefined, `Type ${typeKey} should have color`);
      }
    });

    // ========================================
    // Initialize UI
    // ========================================
    runner.renderAllTests();
    runner.log('Test suite loaded. Click "Run All Tests" to start.', 'info');
    runner.log(`Total tests: ${runner.tests.length}`, 'info');

    // Export to window for button handlers
    window.runAllTests = () => runner.runAll();
    window.runQuickTests = () => {
      runner.runCategory('core');
    };
    window.runCoreTests = () => runner.runCategory('core');
    window.runStorageTests = () => runner.runCategory('storage');
    window.runScenarioTests = () => runner.runCategory('scenario');
    window.runEdgeTests = () => runner.runCategory('edge');
    window.resetTests = () => {
      runner.resetResults();
      runner.log('All tests reset.', 'info');
    };
    window.clearConsole = () => {
      document.getElementById('console-output').innerHTML = '';
    };
  </script>
</body>
</html>
